name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validation:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify referenced files exist
        run: bash scripts/check-referenced-files.sh

      - name: Verify sanitize gate script is executable
        run: test -x scripts/pre-push-sanitize-check.sh

      - name: Verify hook reference checker is executable
        run: test -x scripts/check-referenced-files.sh

      - name: Verify SKILL.md version fields stay in sync
        run: |
          top_version="$(sed -n 's/^version: //p' SKILL.md | head -n1)"
          metadata_version="$(sed -n 's/^  version: //p' SKILL.md | head -n1)"
          test -n "$top_version"
          test -n "$metadata_version"
          test "$top_version" = "$metadata_version"

      - name: Verify changelog pointer exists
        run: test -f CHANGELOG.md
